name: Release Doctor
on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  release_doctor:
    name: release doctor
    runs-on: ubuntu-latest
    if: github.repository == 'team-telnyx/telnyx-node' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'release-please') || github.head_ref == 'next')

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check release environment
        run: |
          bash ./bin/check-release-environment
        env:
          SDK_WRITE_TOKEN: ${{ secrets.SDK_WRITE_TOKEN }}
