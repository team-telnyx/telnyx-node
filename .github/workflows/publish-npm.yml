# This workflow publishes the package to NPM.
# You can run this workflow manually by navigating to https://www.github.com/team-telnyx/telnyx-node/actions/workflows/publish-npm.yml
name: Publish NPM
on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3.9.1
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Install dependencies
        run: |
          pnpm install

      - name: Publish to NPM
        run: |
          bash ./bin/publish-npm
